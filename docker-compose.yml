# 로컬/셀프호스트용 PostgreSQL.
# Supabase 없이 순수 PostgreSQL로 구동할 때 사용한다.
# 마이그레이션(supabase/migrations/*.sql)은 표준 PostgreSQL 15+에서 그대로 실행된다.
#
#   docker compose up -d
#   # 마이그레이션 적용(순서대로)
#   for f in supabase/migrations/*.sql; do
#     docker compose exec -T db psql -U postgres -d pms < "$f"
#   done
#
# 주의: RLS 정책은 Supabase Auth(auth.uid())를 전제로 한다. 순수 PostgreSQL로
# 운영하려면 auth 스키마/JWT 컨텍스트를 별도 구성하거나, 애플리케이션 레벨에서
# 권한을 강제해야 한다. 가장 간단한 경로는 Supabase(관리형 PostgreSQL) 사용이다.

services:
  db:
    image: postgres:16-alpine
    container_name: pms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pms
    ports:
      - "5432:5432"
    volumes:
      - pms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pms_pgdata:
